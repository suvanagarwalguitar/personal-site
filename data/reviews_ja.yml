- display: "続くバッハはとても美しく柔らかな響きに惹かれる。2弦のトリルもきれいで、エンディングの大きな広がりも素晴らしい！"
  source: "現代ギター26年02月号(No.749)"
  quote: "最初は著者には未知のズザーニの作品。(なじみの夢)は細かくて通る美しい響きのアルペジョで始まる。ドビュッシーへのオマージュだろうか？(アラベスク)を思い起こさせる。高音にメロディーが聴こえ、ハープを思わせるアルペジョが飾り、無窮動の動きが続く。翳りはなく、嫌な夢ではなさそう。糸杉もアルペジョが美しいハーモニーを紡いでいく。時折現れるスケール音型も機械的にならずきれいだ！
    
    課題曲は重音のグリサンドが印象的に聴こえる。こちらの耳が慣れてきて、聴くポイントも変わってくるようで、時代に普通の音楽に聴こえてくる。下降のスケールのインパクトが強く、最後のバチンも面白い！ダイナミクスの幅の広さと思い切りがよく、最後はあっさりと終わる。

    続くバッハはとても美しく柔らかな響きに惹かれる。2弦のトリルもきれいで、エンディングの大きな広がりも素晴らしい！

    最後は自分のハイドン。アレグロ・モデラートのからアーティキュレーションが明確で、早く細かい動きもとてもきれいに聴かせる。軽やかで楽しげなリズムに身体が浮き立つ。装飾的な細かい音型も、まったく無理なく、古曲のソナタの楽しさを伝える。メヌエットは最初のアウフタクトの刺繍音の装飾から惹きつけられる。音色の変化も素晴らしく、トリオでも滑らかな歌の表情はギターならではのもので、鍵盤奏者も心惹かれるに違いない。最後のプレスト軽やかなアーティキュレーション！中声部のアルペジョと上下の声部の共演は、各声部の隅々までコントロールが行き届いている！最後までまったく乱れることなく聞き手を引っ張る。ハイドンをきちんと、そしてこんなに楽しく聴かせられることに響きと喜びを感じる。"