text: |
  An internationally prizewinning American guitarist, Suvan Agarwal pushes the limits of the six-string guitar with his performances of keyboard works by composers such as Bach and Haydn, characterized by a uniquely dark and rich sound.

  A recent graduate of Oberlin Conservatory and the Royal Conservatoire of Scotland, he is a student at The Juilliard School as a recipient of a full scholarship.

  Suvan is a D'Addario sponsored artist. He plays exclusively with D'Addario strings on guitars by Saeid Aboutalebian.
