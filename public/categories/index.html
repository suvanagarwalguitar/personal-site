<script>
(function () {
  var nav    = document.getElementById('site-nav');
  var spacer = document.getElementById('nav-spacer');
  var btn    = document.getElementById('nav-toggle');
  var links  = document.getElementById('nav-links');
  if (!nav) return;

  var navTop = nav.getBoundingClientRect().top + window.scrollY;

  function onScroll() {
    if (window.scrollY >= navTop) {
      nav.classList.add('fixed');
      spacer.classList.add('visible');
    } else {
      nav.classList.remove('fixed');
      spacer.classList.remove('visible');
    }
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  if (btn && links) {
    btn.addEventListener('click', function () {
      var open = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!open));
      links.classList.toggle('is-open', !open);
    });
  }
})();
</script>

  <script>
  (function () {
    var lang = localStorage.getItem('lang') || 'en';

    function setLang(l) {
      lang = l;
      localStorage.setItem('lang', l);
      document.body.classList.toggle('lang-ja', l === 'ja');
      document.querySelectorAll('[data-en][data-ja]').forEach(function (el) {
        el.textContent = el.dataset[l];
      });
      document.querySelectorAll('[data-lang]').forEach(function (el) {
        if (el.dataset.lang === l) {
          el.classList.remove('lang-hidden');
        } else {
          el.classList.add('lang-hidden');
        }
      });
    }

    document.getElementById('lang-toggle').addEventListener('click', function () {
      setLang(lang === 'en' ? 'ja' : 'en');
    });

    setLang(lang);

     

    var container = document.querySelector('.home-container');
    var parser = new DOMParser();
    var navigating = false;

    function updateActiveNav(url) {
      var path = new URL(url, location.origin).pathname;
      document.querySelectorAll('.site-nav__link').forEach(function (a) {
        var linkPath = new URL(a.href, location.origin).pathname;
        if (path === linkPath) {
          a.classList.add('active');
        } else {
          a.classList.remove('active');
        }
      });
    }

    function runPageScripts() {
      container.querySelectorAll('script').forEach(function (old) {
        var s = document.createElement('script');
        s.textContent = old.textContent;
        old.parentNode.replaceChild(s, old);
      });
    }

    function navigateTo(url, pushState) {
      if (navigating) return;
      navigating = true;

      fetch(url)
        .then(function (r) { return r.text(); })
        .then(function (html) {
          var doc = parser.parseFromString(html, 'text/html');
          var newContainer = doc.querySelector('.home-container');
          if (newContainer) {
            container.innerHTML = newContainer.innerHTML;

            var newTitle = doc.querySelector('title');
            if (newTitle) document.title = newTitle.textContent;

            if (pushState) {
              history.pushState(null, '', url);
            }

            updateActiveNav(url);
            setLang(lang);
            runPageScripts();
            window.scrollTo(0, 0);
          } else {
            location.href = url;
          }
          navigating = false;
        })
        .catch(function () {
          location.href = url;
          navigating = false;
        });
    }

    document.addEventListener('click', function (e) {
      var link = e.target.closest('a');
      if (!link) return;

      var href = link.getAttribute('href');
      if (!href) return;

      if (link.target === '_blank' || link.hasAttribute('download')) return;
      if (e.ctrlKey || e.metaKey || e.shiftKey) return;

      var url;
      try { url = new URL(href, location.origin); } catch (_) { return; }
      if (url.origin !== location.origin) return;
      if (url.pathname === location.pathname) return;

      e.preventDefault();
      navigateTo(url.href, true);
    });

    window.addEventListener('popstate', function () {
      navigateTo(location.href, false);
    });
  })();
  </script>
